<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#090b12" />
    <meta name="soulrift-version" content="20260604-dead-owner-chest-cleanup-126" />
    <link rel="icon" href="data:," />
    <title>SOULRIFT</title>
    <link rel="stylesheet" href="styles.css?v=20260604-dead-owner-chest-cleanup-126" />
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="Khung chơi Soulrift"></canvas>

    <div id="hud" class="hud hidden" aria-live="polite">
      <div class="hud-left">
        <div class="brand-mini">SOULRIFT</div>
        <div class="bar-frame hp"><span id="hpBar"></span><b id="hpText"></b></div>
        <div class="bar-frame energy"><span id="energyBar"></span><b id="energyText"></b></div>
        <div id="statusStrip" class="status-strip hidden"></div>
      </div>
      <div class="hud-center">
        <div id="roomPill" class="room-pill"></div>
        <div id="objectivePill" class="objective-pill"></div>
      </div>
      <div class="hud-right">
        <div id="skillStrip" class="skill-strip"></div>
      </div>
    </div>

    <main id="screen" class="screen"></main>
    <div id="toast" class="toast hidden"></div>

    <div id="quickActions" class="quick-actions hidden" aria-hidden="true">
      <button data-quick="bag" class="quick-icon-btn" aria-label="Túi">
        <span class="touch-icon bag-icon" aria-hidden="true"></span>
      </button>
      <button data-quick="pause" class="quick-icon-btn" aria-label="Tạm dừng">
        <span class="touch-icon pause-icon" aria-hidden="true"></span>
      </button>
    </div>

    <div id="mobileGate" class="mobile-gate" role="dialog" aria-modal="true" aria-labelledby="mobileGateTitle">
      <div class="mobile-gate-panel">
        <div class="mobile-gate-icon" aria-hidden="true">XOAY</div>
        <h2 id="mobileGateTitle">Bắt buộc xoay ngang</h2>
        <p>Trên điện thoại, Soulrift cần màn hình ngang và toàn màn hình để nút điều khiển không che trận đấu.</p>
        <button id="mobileGateButton" class="btn primary" type="button">BẬT TOÀN MÀN HÌNH</button>
        <span>Nhấn nút rồi xoay máy sang ngang.</span>
      </div>
    </div>

    <div id="touchLayer" class="touch-layer hidden" aria-hidden="true">
      <div id="stick" class="stick"><span></span></div>
      <div class="touch-actions">
        <button data-touch="attack">ĐÁNH</button>
        <button data-touch="dash">LƯỚT</button>
        <button data-touch="q">Q</button>
        <button data-touch="e">E</button>
        <button data-touch="r">R</button>
        <button data-touch="f">TUYỆT</button>
      </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="src/game.js?v=20260604-dead-owner-chest-cleanup-126"></script>
  </body>
</html>
